name: Build for Windows (cmake -> ninja -> mingw-w64-g++-15.2 -> cpack)

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022

    env:
      CMAKE_C_COMPILER: gcc
      CMAKE_CXX_COMPILER: g++
      BUILD_TYPE: Release
      INSTALL_PREFIX: ${{ github.workspace }}/deps/install

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # --------------------------------------------------
      # Install Ninja
      # --------------------------------------------------
      - name: Install Ninja
        run: choco install ninja --no-progress
        
      - name: Verify Ninja
        run: ninja --version
      
      # --------------------------------------------------
      # Install MinGW (niXman GCC 15.2)
      # --------------------------------------------------
      - name: Download MinGW-w64
        run: |
          curl -L -o mingw.7z https://github.com/niXman/mingw-builds-binaries/releases/download/15.2.0-rt_v13-rev1/x86_64-15.2.0-release-win32-seh-msvcrt-rt_v13-rev1.7z
          7z x mingw.7z -omingw
    
      - name: Setup MinGW environment
        run: |
          echo "${{ github.workspace }}\mingw\mingw64\bin" >> $env:GITHUB_PATH
    
      - name: Verify compiler
        run: g++ --version
    
      # --------------------------------------------------
      # Build GLFW
      # --------------------------------------------------
      - name: Build GLFW
        run: |
          git clone https://github.com/glfw/glfw.git
          cmake -S glfw -B glfw/build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX `
            -DGLFW_BUILD_DOCS=OFF `
            -DGLFW_BUILD_TESTS=OFF `
            -DGLFW_BUILD_EXAMPLES=OFF
          cmake --build glfw/build
          cmake --install glfw/build
    
      # --------------------------------------------------
      # Build FreeType
      # --------------------------------------------------
      - name: Build FreeType
        run: |
          git clone https://github.com/freetype/freetype.git
          cmake -S freetype -B freetype/build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX `
            -DBUILD_SHARED_LIBS=OFF
          cmake --build freetype/build
          cmake --install freetype/build
    
      # --------------------------------------------------
      # Build Rostam Media
      # --------------------------------------------------
      - name: Configure project
        run: |
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX 

      - name: Build project
        run: cmake --build build --config Release

      - name: Install project
        run: cmake --install build --prefix install
    
      # --------------------------------------------------
      # Packaging
      # --------------------------------------------------
      - name: Package
        run: |
          cd build
          cpack -G NSIS

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: build/*.exe
    
    